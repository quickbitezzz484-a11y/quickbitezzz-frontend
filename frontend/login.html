<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBitezzz Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h1>🍔 QuickBitezzz</h1>
        <p class="subtitle">College Login</p>
        <p style="font-size:12px; color:#ffffff;">Only college students allowed</p>

        <input type="text" id="studentName" placeholder="Enter Name">
        <input type="text" id="rollNo" placeholder="Enter Roll Number">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="loginUser()">Login</button>

        <div id="loginResult" class="login-result">
            Please login with your college details
        </div>
    </div>
</div>

<script>
const API_BASE = "https://quickbitezzz-backend4.onrender.com";

localStorage.removeItem("studentName");
localStorage.removeItem("rollNo");

async function loginUser() {
    const name = document.getElementById("studentName").value.trim();
    const rollNo = document.getElementById("rollNo").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!name || !rollNo || !password) {
        document.getElementById("loginResult").innerHTML = "Please fill all fields.";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                roll_no: rollNo,
                password: password
            })
        });

        const data = await res.json();
        console.log("Login response:", data);

        if (res.ok && data.success && data.user) {
            localStorage.setItem("studentName", data.user.name || "");
            localStorage.setItem("rollNo", data.user.roll_no || "");

            document.getElementById("loginResult").innerHTML = "Login successful ✅ Redirecting...";
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        } else {
            localStorage.removeItem("studentName");
            localStorage.removeItem("rollNo");
            document.getElementById("loginResult").innerHTML = data.message || "Invalid login details.";
        }
    } catch (err) {
        console.log("Login error:", err);
        localStorage.removeItem("studentName");
        localStorage.removeItem("rollNo");
        document.getElementById("loginResult").innerHTML = "Login failed. Check backend.";
    }
}
</script>

</body>
</html>
